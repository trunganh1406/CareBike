name: mobile_app
description: "CareBike Mobile Application"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  firebase_messaging: ^16.0.0
  provider: ^6.1.2
  http: ^1.6.0
  shared_preferences: ^2.2.3
  mobile_scanner: ^7.2.0
  google_sign_in: ^6.2.1
  stomp_dart_client: ^3.0.1
  qr_flutter: ^4.1.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^11.0.1
  url_launcher: ^6.3.0
  intl: ^0.20.2
  image_picker: ^1.1.2
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/sos_alarm.wav
